    .blog {
      background-image: url('/assets/shaka.svg');
      width: 12vh;
      height: 15vh;
      display: block;
      margin: auto;  
      background-repeat: no;
      opacity: .75;
      transition:.25s;
      -webkit-filter: drop-shadow(4px 3px #444);
      animation: wiggle 1s;




      }

    @keyframes wiggle {
      25% {transform: rotate(0deg);}
      45% {transform: rotate(-20deg);}
      75% {transform: rotate(5deg);}
      90% {transform: rotate(-15deg);}    
      100% {transform: rotate(0deg);}
    }

    .blog:hover {
      opacity: .9;
      transform: rotate(20deg);
      -webkit-transform-origin: 30% 60%;
      -webkit-backface-visibility: hidden;
      -webkit-filter: drop-shadow(4px 3px #8a7967);
    }


    .wrapper {
      max-width: calc(800px - (30px * 2));
      margin-right: auto;
      margin-left: auto;

      padding-left: 30px;

      position: relative;
      width: auto;
      opacity: 1;

    }
